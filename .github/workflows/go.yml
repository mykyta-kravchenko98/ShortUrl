# CI: build, vet, test and (on master) publish a container image to ECR.
# No more zip+S3+CodeDeploy - deployment is fully Docker/Kubernetes now,
# driven by ArgoCD from the shorturl-gitops repo, which just watches for a
# new image tag. Auth to AWS is via OIDC (no long-lived keys in GitHub
# Secrets) - see docs/CI_AWS_SETUP.md for the one-time IAM setup.

name: CI

env:
  # Check yours: aws configure get region --profile shorturl
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "528081867341"
  IMAGE: shorturl

on:
  push:
    branches: [master, staging, test, dev]
  pull_request:
    branches: [master, staging, test, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: ""
          POSTGRES_DB: pro
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go mod verify
        run: go mod verify

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -race -vet=off ./...

  image:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is what lets this job request an OIDC token from
      # GitHub and exchange it for temporary AWS creds - no static keys.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/shorturl-gha-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:latest
