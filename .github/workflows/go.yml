# CI: build, vet, test and (on master) publish a container image to ECR.
# No more zip+S3+CodeDeploy - deployment is fully Docker/Kubernetes now,
# driven by ArgoCD from the shorturl-gitops repo, which just watches for a
# new image tag. Auth to AWS is via OIDC (no long-lived keys in GitHub
# Secrets) - see docs/CI_AWS_SETUP.md for the one-time IAM setup.

name: CI

env:
  # Check yours: aws configure get region --profile shorturl
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "528081867341"
  IMAGE: shorturl

on:
  push:
    branches: [master, staging, test, dev]
  pull_request:
    branches: [master, staging, test, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: ""
          POSTGRES_DB: pro
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go mod verify
        run: go mod verify

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -race -vet=off ./...

  image:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is what lets this job request an OIDC token from
      # GitHub and exchange it for temporary AWS creds - no static keys.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/shorturl-gha-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push app image
        id: build-app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:latest

      # Same repo, same commit, separate tiny image: cmd/migrate has the
      # SQL migrations embedded via go:embed, so it's always exactly in
      # sync with whatever schema this commit's app code expects. Run as
      # a Helm hook Job in shorturl-gitops instead of a hand-copied
      # ConfigMap of SQL files.
      - name: Build and push migrate image
        id: build-migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}-migrate:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}-migrate:latest

      # Bumps image.tag / postgres.migrateImage.tag in shorturl-gitops to
      # this commit's SHA, so ArgoCD actually has something to sync (the
      # ":latest" tag never changes in git, so ArgoCD had no way to know a
      # new image existed - this is what makes new builds roll out
      # automatically instead of requiring a manual crictl rmi + pod
      # delete). Needs a PAT with push access to shorturl-gitops in the
      # GITOPS_DEPLOY_TOKEN secret - a fine-grained GitHub PAT scoped to
      # just that repo's contents (read/write) is enough, no org-wide access.
      - name: Bump image tags in shorturl-gitops
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_DEPLOY_TOKEN }}
          NEW_TAG: ${{ github.sha }}
          APP_DIGEST: ${{ steps.build-app.outputs.digest }}
          MIGRATE_DIGEST: ${{ steps.build-migrate.outputs.digest }}
        run: |
          # Not --depth 1: a shallow clone can make the rebase-and-retry
          # loop below flaky, and this repo is tiny anyway.
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/mykyta-kravchenko98/shorturl-gitops.git gitops-repo
          cd gitops-repo

          sudo curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Two workflow runs bumping the tag at nearly the same time (e.g.
          # two quick pushes to master) will both clone before either has
          # pushed, so the second one's push gets rejected as non-fast-
          # forward. Retry with a rebase instead of just failing the job -
          # the yq edits are idempotent (setting the same field to the same
          # value is a no-op), so reapplying them after a rebase is safe.
          for attempt in 1 2 3 4 5; do
            # digest is the primary pin (shorturl.imageRef prefers it); tag
            # is still bumped alongside it as a human-readable fallback for
            # before the first digest-aware CI run and for manual overrides.
            yq -i '.image.tag = strenv(NEW_TAG)' helm/shorturl/values.yaml
            yq -i '.image.digest = strenv(APP_DIGEST)' helm/shorturl/values.yaml
            yq -i '.postgres.migrateImage.tag = strenv(NEW_TAG)' helm/shorturl/values.yaml
            yq -i '.postgres.migrateImage.digest = strenv(MIGRATE_DIGEST)' helm/shorturl/values.yaml

            git add helm/shorturl/values.yaml
            if git diff --cached --quiet; then
              echo "no tag change"
              exit 0
            fi
            git commit -m "chore: bump shorturl image tags to ${NEW_TAG}"

            if git push; then
              echo "pushed on attempt ${attempt}"
              exit 0
            fi

            echo "push rejected on attempt ${attempt}, rebasing and retrying"
            git fetch origin main
            git rebase origin/main
            sleep $(( (RANDOM % 5) + 1 ))
          done

          echo "failed to push tag bump after 5 attempts"
          exit 1
